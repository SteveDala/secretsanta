  <button
    hx-get="
      {% if object %}
        {% url 'gifting:wishlist_detail' object.wishlist.id %}
      {% else %}
        {% url 'gifting:wishlist_detail' wishlist.id %}
      {% endif %}
    "
    hx-target="#wishlist-section"
    hx-push-url="true"
  >
    ← Back to list
  </button>

<h2>
    {% if object %}Edit Wish{% else %}Add Wish{% endif %}
</h2>

<form
  method="post"
  hx-post="
    {% if object %}
      {% url 'gifting:wish_detail' object.wishlist.id object.id %}
    {% else %}
      {% url 'gifting:wish_create' wishlist.id %}
    {% endif %}
  "
  hx-target="#wishlist-section"
  hx-push-url="
    {% if object %}
      {% url 'gifting:wishlist_detail' object.wishlist.id %}
    {% else %}
      {% url 'gifting:wishlist_detail' wishlist.id %}
    {% endif %}
  "
>
  {% csrf_token %}

  <p>Title: {{ form.title }}</p>
  <p>Description:<br>{{ form.description }}</p>
  <p>Price: {{ form.price }}</p>
  <p>URL: {{ form.url }}</p>

  <button type="submit">
    {% if object %}Save{% else %}Add{% endif %}
  </button>
</form>

{% if object %}

  <form
      method="post"
      hx-post="{% url 'gifting:wish_delete' object.wishlist.id object.id %}"
      hx-target="#wishlist-section"
      hx-confirm="Are you sure you want to delete this item?"
  >
    {% csrf_token %}
    <button type="Submit">Delete</button>
  </form>

{% endif %}
